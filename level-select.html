<!DOCTYPE html>
<html>
<head>
    <title>Shadow Hop - Levels</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="level-select">
   <div class="overlay">
   <h1>Choose Your Path</h1>

   <div class="level-grid">
      <div class="level unlocked" onclick="window.location.href='level1.html'">Level 1</div>
     <div class="level unlocked" onclick="window.location.href='level2.html'">Level 2</div>
      <div class="level unlocked" onclick="window.location.href='level3.html'">Level 3</div>
      <div class="level unlocked" onclick="window.location.href='level4.html'">Level 4</div>

      
</div>
   </div>
</div>

<script>
function goLevel(level){
    if(level <= 1){
        window.location.href = "level" + level + ".html";
    }

}
</script>

</body>
</html>
